<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>支付宝支付 - AI-Agent-Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
    </style>
</head>
<body>
    <div class="max-w-md w-full">
        <div class="bg-white rounded-2xl shadow-2xl overflow-hidden">
            <!-- Header -->
            <div class="bg-gradient-to-r from-blue-500 to-blue-600 p-6 text-white">
                <div class="flex items-center justify-between">
                    <div>
                        <h1 class="text-2xl font-bold">支付宝支付</h1>
                        <p class="opacity-90">AI-Agent-Hub 专业服务</p>
                    </div>
                    <div class="text-4xl">
                        <i class="fab fa-alipay"></i>
                    </div>
                </div>
            </div>
            
            <!-- Content -->
            <div class="p-8">
                <!-- Payment Info -->
                <div class="mb-8 text-center">
                    <div class="text-5xl font-bold text-gray-800 mb-2" id="amount">$49.99</div>
                    <div class="text-gray-600" id="plan-name">专业版 月费</div>
                </div>
                
                <!-- QR Code -->
                <div class="mb-8">
                    <div class="text-center mb-4">
                        <div class="inline-block px-4 py-2 bg-blue-100 text-blue-600 rounded-full text-sm font-semibold">
                            请使用支付宝扫码支付
                        </div>
                    </div>
                    <div class="bg-gray-50 p-6 rounded-xl border-2 border-dashed border-gray-300">
                        <div class="flex justify-center mb-4">
                            <div class="relative">
                                <img src="http://miaobi-lite.cdn.bcebos.com/ojbk/fly/alipay.jpeg" 
                                     alt="支付宝收款码" 
                                     class="w-64 h-64 rounded-lg shadow-lg">
                                <div class="absolute -top-2 -right-2 bg-blue-500 text-white rounded-full w-8 h-8 flex items-center justify-center">
                                    <i class="fas fa-qrcode text-sm"></i>
                                </div>
                            </div>
                        </div>
                        <div class="text-center text-sm text-gray-600">
                            <p>打开支付宝扫一扫完成支付</p>
                        </div>
                    </div>
                </div>
                
                <!-- Payment Details -->
                <div class="space-y-4 mb-8">
                    <div class="flex justify-between items-center p-4 bg-gray-50 rounded-lg">
                        <div class="text-gray-600">商品名称</div>
                        <div class="font-semibold" id="product-name">AI-Agent-Hub 专业版</div>
                    </div>
                    <div class="flex justify-between items-center p-4 bg-gray-50 rounded-lg">
                        <div class="text-gray-600">订单号</div>
                        <div class="font-mono text-blue-600" id="order-id">ORD-${Date.now().toString().slice(-8)}</div>
                    </div>
                    <div class="flex justify-between items-center p-4 bg-gray-50 rounded-lg">
                        <div class="text-gray-600">支付方式</div>
                        <div class="font-semibold text-green-600">支付宝</div>
                    </div>
                </div>
                
                <!-- Instructions -->
                <div class="bg-yellow-50 border border-yellow-200 rounded-xl p-4 mb-6">
                    <div class="flex items-start">
                        <div class="text-yellow-500 mr-3 mt-1">
                            <i class="fas fa-info-circle"></i>
                        </div>
                        <div class="text-sm">
                            <p class="font-semibold text-yellow-800">重要提示</p>
                            <p class="text-yellow-700 mt-1">
                                支付完成后，请将支付截图发送至：<br>
                                <span class="font-mono">ai-agent-hub@test.com</span><br>
                                我们将在24小时内为您开通服务。
                            </p>
                        </div>
                    </div>
                </div>
                
                <!-- Buttons -->
                <div class="space-y-3">
                    <button onclick="markAsPaid()" class="w-full py-4 bg-gradient-to-r from-green-500 to-green-600 hover:from-green-600 hover:to-green-700 text-white font-bold rounded-xl transition transform hover:scale-105">
                        <i class="fas fa-check-circle mr-2"></i>
                        我已支付完成
                    </button>
                    <button onclick="window.close()" class="w-full py-3 bg-gray-200 hover:bg-gray-300 text-gray-800 font-semibold rounded-xl transition">
                        返回修改
                    </button>
                </div>
            </div>
            
            <!-- Footer -->
            <div class="bg-gray-50 p-4 text-center text-sm text-gray-600">
                <p>© 2026 AI-Agent-Hub · 基于开源项目构建 · 测试环境</p>
            </div>
        </div>
        
        <!-- Success Modal -->
        <div id="success-modal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center p-4">
            <div class="bg-white rounded-2xl p-8 max-w-sm w-full text-center">
                <div class="text-green-500 text-5xl mb-4">
                    <i class="fas fa-check-circle"></i>
                </div>
                <h3 class="text-2xl font-bold mb-2">支付已确认！</h3>
                <p class="text-gray-600 mb-6">感谢您的支持！我们将在24小时内为您开通服务。</p>
                <button onclick="closeSuccessModal()" class="w-full py-3 bg-blue-500 hover:bg-blue-600 text-white font-bold rounded-xl transition">
                    关闭窗口
                </button>
            </div>
        </div>
    </div>
    
    <!-- Font Awesome -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
    
    <script>
        // Get URL parameters
        const urlParams = new URLSearchParams(window.location.search);
        const plan = urlParams.get('plan') || 'pro';
        const amount = urlParams.get('amount') || '49.99';
        
        // Update page content
        document.getElementById('amount').textContent = `$${amount}`;
        document.getElementById('plan-name').textContent = plan === 'pro' ? '专业版 月费' : '企业版 月费';
        document.getElementById('product-name').textContent = `AI-Agent-Hub ${plan === 'pro' ? '专业版' : '企业版'}`;
        
        // Generate order ID
        document.getElementById('order-id').textContent = `ORD-${Date.now().toString().slice(-8)}`;
        
        function markAsPaid() {
            // Show success modal
            document.getElementById('success-modal').classList.remove('hidden');
            document.getElementById('success-modal').classList.add('flex');
            
            // Log payment (in real app, this would go to backend)
            console.log(`Payment recorded: $${amount} for ${plan} plan`);
            console.log('Order ID:', document.getElementById('order-id').textContent);
            console.log('Timestamp:', new Date().toLocaleString());
            
            // In real app, send to backend:
            // fetch('/api/payment/confirm', {
            //     method: 'POST',
            //     body: JSON.stringify({
            //         plan: plan,
            //         amount: amount,
            //         orderId: document.getElementById('order-id').textContent,
            //         paymentMethod: 'alipay'
            //     })
            // });
        }
        
        function closeSuccessModal() {
            document.getElementById('success-modal').classList.add('hidden');
            document.getElementById('success-modal').classList.remove('flex');
            setTimeout(() => {
                window.close();
            }, 1000);
        }
        
        // Auto-log page view
        console.log('Alipay payment page loaded for plan:', plan, 'amount:', amount);
    </script>
</body>
</html>
